# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Test beets Master

permissions:
    contents: read

on:
    push:
    pull_request:
        types: [opened, reopened]

    schedule:
        - cron: "0 0 * * 1" # Every Monday at midnight UTC
    workflow_dispatch:

jobs:
    test-beets-master:
        name: Test against beets@master
        runs-on: ubuntu-24.04

        env:
            TOXENV: beets-master

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Python
              id: setup-python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: .python-version

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Cache tox environments
              id: cache-tox
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: .tox
                  key: tox-${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-${{ env.TOXENV }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
                  restore-keys: |
                      tox-${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-${{ env.TOXENV }}-

            - name: Run Tests
              # Failures are sometimes expected, so this ensures they don't send failure notifications.
              continue-on-error: true
              run: uvx tox -e "$TOXENV"
