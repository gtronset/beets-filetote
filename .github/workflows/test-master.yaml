# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Test beets Master

permissions:
    contents: read

on:
    push:
    pull_request:
        types: [opened, reopened]

    schedule:
        - cron: "0 0 * * 1" # Every Monday at midnight UTC
    workflow_dispatch:

jobs:
    test-beets-master:
        name: Test against beets@master
        runs-on: ubuntu-24.04
        # Failures are sometimes expected, so this ensures they don't send failure notifications.
        continue-on-error: true

        env:
            TOXENV: beets-master
            POETRY_VERSION: 1.8.5
            PYTHON_VERSION: 3.14

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Pipx Environment Variables
              id: pipx-env-setup
              run: |
                  PATH_SEP="${{ !startsWith(runner.os, 'windows') && '/' || '\\' }}"
                  echo "PATH_SEP=${PATH_SEP}" >> $GITHUB_ENV

                  PIPX_CACHE="${{ github.workspace }}${PATH_SEP}pipx_cache"
                  echo "pipx-cache-path=${PIPX_CACHE}" >> $GITHUB_OUTPUT
                  echo "pipx-version=$(pipx --version)" >> $GITHUB_OUTPUT
                  echo "PIPX_HOME=${PIPX_CACHE}${PATH_SEP}home" >> $GITHUB_ENV
                  echo "PIPX_BIN_DIR=${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_ENV
                  echo "PIPX_MAN_DIR=${PIPX_CACHE}${PATH_SEP}man" >> $GITHUB_ENV
                  echo "${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_PATH

            - name: Cache Pipx
              id: cache-pipx
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ steps.pipx-env-setup.outputs.pipx-cache-path }}
                  key: ${{ runner.os }}-python_${{ env.PYTHON_VERSION }}-pipx_${{ steps.pipx-env-setup.outputs.pipx-version }}-poetry_${{ env.POETRY_VERSION }}-tox

            - name: Install Poetry & Tox
              if: steps.cache-pipx.outputs.cache-hit != 'true'
              run: |
                  pipx install poetry==${{ env.POETRY_VERSION }}
                  pipx install tox

            - name: Setup Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Cache tox environments
              id: cache-tox
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: .tox
                  key: tox-${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-${{ env.TOXENV }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}
                  restore-keys: |
                      tox-${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-${{ env.TOXENV }}-

            - name: Run Tests
              run: tox -e $TOXENV
