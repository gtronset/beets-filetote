# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

permissions:
    contents: write

on:
    workflow_dispatch:

jobs:
    release:
        name: Release

        runs-on: ubuntu-24.04

        env:
            UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
            UV_PUBLISH_URL: ${{ github.event.act && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
            UV_PUBLISH_CHECK_URL: ${{ github.event.act && 'https://test.pypi.org/simple' || 'https://pypi.org/simple' }}

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: .tool-versions

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Build project for distribution
              run: uv build

            - name: Read version from pyproject
              id: package-version
              run: |
                  python - <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("pyproject.toml").read_text())
                  version = data["project"]["version"]
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"version={version}\n")
                  PY

            - name: Check Version
              id: check-version
              run: |
                  [[ "${{ steps.package-version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || echo "prerelease=true" >> "$GITHUB_OUTPUT"

            - name: Create Release
              if: ${{ !github.event.act }}
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  artifacts: dist/*
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: v${{ steps.package-version.outputs.version }}
                  draft: false
                  generateReleaseNotes: true
                  prerelease: ${{ steps.check-version.outputs.prerelease == 'true' }}

            - name: Publish package
              run: |
                  set -euxo pipefail
                  msg="Publishing version ${{ steps.package-version.outputs.version }} to ${UV_PUBLISH_URL} (check: ${UV_PUBLISH_CHECK_URL})"
                  echo "::warning::$msg"
                  echo "$msg" >&2
                  echo "$msg" >> "$GITHUB_STEP_SUMMARY"
                  uv publish --dry-run --token "$UV_PUBLISH_TOKEN" --publish-url "$UV_PUBLISH_URL" --check-url "$UV_PUBLISH_CHECK_URL"
