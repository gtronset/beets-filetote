# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
    workflow_dispatch:
        inputs:
            target:
                description: "Publish target"
                required: true
                default: testpypi
                type: choice
                options:
                    - testpypi
                    - pypi

jobs:
    build:
        name: Build
        runs-on: ubuntu-24.04
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version-file: .python-version

            - name: Setup uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Build
              run: uv build

            - name: Read version from pyproject
              id: version
              run: |
                  python - <<'PY'
                  import os, tomllib
                  from pathlib import Path
                  data = tomllib.loads(Path("pyproject.toml").read_text())
                  version = data["project"]["version"]
                  with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                      fh.write(f"version={version}\n")
                  PY

            - name: Upload dist
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: dist
                  path: dist/

        outputs:
            version: ${{ steps.version.outputs.version }}

    publish:
        name: Publish to ${{ inputs.target }}
        needs: build
        runs-on: ubuntu-24.04
        permissions:
            id-token: write
            attestations: write
        environment:
            name: ${{ inputs.target }}
            url: ${{ inputs.target == 'pypi' && 'https://pypi.org/p/beets-filetote/' || 'https://test.pypi.org/p/beets-filetote/' }}

        steps:
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: dist/

            - name: Publish
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
              with:
                  repository-url: ${{ inputs.target == 'pypi' && 'https://upload.pypi.org/legacy/' || 'https://test.pypi.org/legacy/' }}

    github-release:
        name: GitHub Release
        needs: build
        if: inputs.target == 'pypi' && !github.event.act
        runs-on: ubuntu-24.04
        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: dist
                  path: dist/

            - name: Attest build provenance
              uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
              with:
                  subject-path: dist/*

            - name: Check if prerelease
              id: check-version
              run: |
                  [[ "${{ needs.build.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || echo "prerelease=true" >> "$GITHUB_OUTPUT"

            - name: Create Release
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  artifacts: dist/*
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: v${{ needs.build.outputs.version }}
                  generateReleaseNotes: true
                  prerelease: ${{ steps.check-version.outputs.prerelease == 'true' }}
