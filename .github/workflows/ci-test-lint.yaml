# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI - Test & Lint

permissions:
    contents: read

on:
    push:
    pull_request:
        types: [opened, reopened]

defaults:
    run:
        shell: bash

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                os: [ubuntu-24.04, windows-2022]
                beets-version: ["latest"]
                include:
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.4"
                      toxenv: "beets-2_4"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.5"
                      toxenv: "beets-2_5"
                    - python-version: "3.13" # Official Support for 3.13 starts with beets 2.6
                      os: ubuntu-24.04
                      beets-version: "2.6"
                      toxenv: "beets-2_6"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.7"
                      toxenv: "beets-2_7"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.8"
                      toxenv: "beets-2_8"
                    - python-version: "3.14" # Official Support for 3.14 starts with beets 2.9
                      os: ubuntu-24.04
                      beets-version: "2.9"
                      toxenv: "beets-2_9"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.10"
                      toxenv: "beets-2_10"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.11"
                      toxenv: "beets-2_11"

        env:
            TOXENV: ${{ matrix.toxenv || matrix.python-version }}

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Python ${{ matrix.python-version }}
              id: setup-python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            # - name: Cache tox environments
            #   id: cache-tox
            #   uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
            #   with:
            #       path: .tox/${{ env.TOXENV }}
            #       key: tox-${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-${{ env.TOXENV }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}

            - name: Run Tests
              run: uvx tox -e "$TOXENV"

    lint:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: .python-version

            - name: Setup uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Install lint dependencies
              run: uv sync --frozen --group lint

            - name: Check mypy
              if: always()
              run: uv run mypy

            - name: Check Ruff (Lint)
              if: always()
              run: uv run ruff check

            - name: Check Ruff (Format)
              if: always()
              run: uv run ruff format --check
