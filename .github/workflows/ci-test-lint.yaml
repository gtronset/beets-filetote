# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI - Test & Lint

permissions:
    contents: read

on:
    push:
    pull_request:
        types: [opened, reopened]

env:
    POETRY_VERSION: 1.8.5
    PYTHON_VERSION: 3.14

defaults:
    run:
        shell: bash

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                os: [ubuntu-24.04, windows-2022]
                beets-version: ["latest"]
                include:
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.4"
                      toxenv: "beets-2_4"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.5"
                      toxenv: "beets-2_5"
                    - python-version: "3.13" # Official Support for 3.13 starts with beets 2.6
                      os: ubuntu-24.04
                      beets-version: "2.6"
                      toxenv: "beets-2_6"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.7"
                      toxenv: "beets-2_7"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.8"
                      toxenv: "beets-2_8"
                    - python-version: "3.14" # Official Support for 3.14 starts with beets 2.9
                      os: ubuntu-24.04
                      beets-version: "2.9"
                      toxenv: "beets-2_9"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.10"
                      toxenv: "beets-2_10"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.11"
                      toxenv: "beets-2_11"

        env:
            TOXENV: ${{ matrix.toxenv || matrix.python-version }}

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Pipx Environment Variables
              id: pipx-env-setup
              run: |
                  PATH_SEP="${{ !startsWith(runner.os, 'windows') && '/' || '\\' }}"
                  echo "PATH_SEP=${PATH_SEP}" >> $GITHUB_ENV

                  PIPX_CACHE="${{ github.workspace }}${PATH_SEP}pipx_cache"
                  echo "pipx-cache-path=${PIPX_CACHE}" >> $GITHUB_OUTPUT
                  echo "pipx-version=$(pipx --version)" >> $GITHUB_OUTPUT
                  echo "PIPX_HOME=${PIPX_CACHE}${PATH_SEP}home" >> $GITHUB_ENV
                  echo "PIPX_BIN_DIR=${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_ENV
                  echo "PIPX_MAN_DIR=${PIPX_CACHE}${PATH_SEP}man" >> $GITHUB_ENV
                  echo "${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_PATH

            - name: Cache Pipx
              id: cache-pipx
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ steps.pipx-env-setup.outputs.pipx-cache-path }}
                  key:
                      ${{ runner.os }}-python_${{ matrix.python-version }}-pipx_${{
                      steps.pipx-env-setup.outputs.pipx-version }}-poetry_${{
                      env.POETRY_VERSION }}-tox

            - name: Install Poetry & Tox
              if: steps.cache-pipx.outputs.cache-hit != 'true'
              run: |
                  pipx install poetry==${{ env.POETRY_VERSION }}
                  pipx install tox

            - name: Setup Python ${{ matrix.python-version }}
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Cache tox environments
              id: cache-tox
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: .tox
                  key:
                      tox-${{ runner.os }}-py-${{ matrix.python-version }}-${{ env.TOXENV }}-${{
                      hashFiles('**/pyproject.toml', '**/poetry.lock') }}
                  restore-keys: |
                      tox-${{ runner.os }}-py-${{ matrix.python-version }}-${{ env.TOXENV }}-

            - name: Run Tests
              run: tox -e $TOXENV

    lint:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup Pipx Environment Variables
              id: pipx-env-setup
              run: |
                  PATH_SEP="${{ !startsWith(runner.os, 'windows') && '/' || '\\' }}"

                  PIPX_CACHE="${{ github.workspace }}${PATH_SEP}pipx_cache"
                  echo "pipx-cache-path=${PIPX_CACHE}" >> $GITHUB_OUTPUT
                  echo "pipx-version=$(pipx --version)" >> $GITHUB_OUTPUT
                  echo "PIPX_HOME=${PIPX_CACHE}${PATH_SEP}home" >> $GITHUB_ENV
                  echo "PIPX_BIN_DIR=${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_ENV
                  echo "PIPX_MAN_DIR=${PIPX_CACHE}${PATH_SEP}man" >> $GITHUB_ENV
                  echo "${PIPX_CACHE}${PATH_SEP}bin" >> $GITHUB_PATH

            - name: Cache Pipx
              id: cache-pipx
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ steps.pipx-env-setup.outputs.pipx-cache-path }}
                  key:
                      ${{ runner.os }}-python_${{ env.PYTHON_VERSION }}-pipx_${{
                      steps.pipx-env-setup.outputs.pipx-version }}-poetry_${{
                      env.POETRY_VERSION }}

            - name: Install Poetry & Tox
              if: steps.cache-pipx.outputs.cache-hit != 'true'
              run: |
                  pipx install poetry==${{ env.POETRY_VERSION }}

            - name: Setup Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: poetry

            - name: Install poetry Dependencies
              run: poetry install

            - name: Check mypy
              if: always()
              run: |
                  poetry run mypy

            - name: Check Ruff (Lint)
              if: always()
              run: |
                  poetry run ruff check

            - name: Check Ruff (Format)
              if: always()
              run: |
                  poetry run ruff format
