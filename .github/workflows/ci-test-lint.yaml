# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI - Test & Lint

permissions:
    contents: read

on:
    push:
    pull_request:
        types: [opened, reopened]

defaults:
    run:
        shell: bash

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                os: [ubuntu-24.04, windows-2025]
                beets-version: ["latest"]
                include:
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.4"
                      toxenv: "beets-2_4"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.5"
                      toxenv: "beets-2_5"
                    - python-version: "3.13" # Official Support for 3.13 starts with beets 2.6
                      os: ubuntu-24.04
                      beets-version: "2.6"
                      toxenv: "beets-2_6"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.7"
                      toxenv: "beets-2_7"
                    - python-version: "3.13"
                      os: ubuntu-24.04
                      beets-version: "2.8"
                      toxenv: "beets-2_8"
                    - python-version: "3.14" # Official Support for 3.14 starts with beets 2.9
                      os: ubuntu-24.04
                      beets-version: "2.9"
                      toxenv: "beets-2_9"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.10"
                      toxenv: "beets-2_10"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.11"
                      toxenv: "beets-2_11"
                    - python-version: "3.14"
                      os: ubuntu-24.04
                      beets-version: "2.12"
                      toxenv: "beets-2_12"

        env:
            TOXENV: ${{ matrix.toxenv || matrix.python-version }}

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Setup Python ${{ matrix.python-version }}
              id: setup-python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Setup uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Run Tests
              run: uvx tox -e "$TOXENV"

    lint:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Setup Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version-file: .python-version

            - name: Setup uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true
                  cache-dependency-glob: |
                      uv.lock
                      pyproject.toml

            - name: Install lint dependencies
              run: uv sync --frozen --group lint --group test

            - name: Check mypy
              if: always()
              run: uv run mypy

            - name: Check Ruff (Lint)
              if: always()
              run: uv run ruff check

            - name: Check Ruff (Format)
              if: always()
              run: uv run ruff format --check

            - name: Check Semgrep
              if: always()
              run: uv run semgrep --config .semgrep/logging.yml --metrics=off --disable-version-check --error
