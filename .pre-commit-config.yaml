# yaml-language-server: $schema=https://json.schemastore.org/pre-commit-config.json

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
      hooks:
          - id: check-yaml
          - id: check-toml
          - id: end-of-file-fixer
          - id: trailing-whitespace
            args: [--markdown-linebreak-ext=md]
          - id: mixed-line-ending
            args: ["--fix=lf"]
          - id: no-commit-to-branch
          - id: check-added-large-files
            args: ["--maxkb=500"]

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: 01a675ea018f2fb714478a5ffb83fcea8374bb06 # v0.15.21
      hooks:
          - id: ruff
            name: lint
            alias: lint
          - id: ruff
            name: lint-fix
            alias: lint-fix
            args: [--fix]
            stages: [manual]
          - id: ruff-format
            name: format
            alias: format

    - repo: https://github.com/DavidAnson/markdownlint-cli2
      rev: 06f92c99e930c11230426b5edd775021d25e08a8 # v0.23.1
      hooks:
          - id: markdownlint-cli2
          - id: markdownlint-cli2
            name: markdownlint-cli2-fix
            alias: markdownlint-cli2-fix
            args: ["--fix"]
            stages: [manual]

    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: 41e691678310dfd3833f7ab4e180ddb014310356 # v2.3.0
      hooks:
          - id: mypy
            additional_dependencies: [pytest]

    - repo: https://github.com/asottile/pyupgrade
      rev: 75992aaa40730136014f34227e0135f63fc951b4 # v3.21.2
      hooks:
          - id: pyupgrade
            args:
                - --py310-plus
                - --keep-percent-format
                - --keep-mock
                - --keep-runtime-typing
                - --exit-zero-even-if-changed
            stages: [manual]

    - repo: https://github.com/adhtruong/mirrors-typos
      # https://github.com/crate-ci/typos/issues/390
      rev: 05930bc4fc01df638388912e6a985a1a4841d1e1 # v1.48.0
      hooks:
          - id: typos
            exclude: "(_typos.toml|.gitignore)"

    - repo: local
      hooks:
          - id: semgrep
            name: semgrep
            entry: uv run semgrep --config .semgrep/logging.yml --metrics=off --disable-version-check --error --include="*.py"
            language: system
            pass_filenames: true
            files: ^(beetsplug/|tests/)
            types: [python]

    - repo: https://github.com/abravalheri/validate-pyproject
      rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # v0.25
      hooks:
          - id: validate-pyproject
            additional_dependencies:
                - "validate-pyproject[all]"
                - "validate-pyproject-schema-store"
